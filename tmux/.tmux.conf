# Prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# General
set -g mouse on
setw -g mode-keys vi
set -sg escape-time 0
set -g repeat-time 600
set -g history-limit 50000
set -g focus-events on

# Color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g set-clipboard on

# ── Windows & panes ──────────────────────────────────────────────────────────
setw -g pane-base-index 1        # start pane numbering at 1
set -g renumber-windows on       # renumber when a window is closed
setw -g automatic-rename off     # don't rename window to current program
set -g set-titles on             # set terminal title

set -g display-panes-time 800
set -g display-time 1000

# Activity
set -g monitor-activity on
set -g visual-activity off

# ── Navigation ───────────────────────────────────────────────────────────────
# Splits
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# Pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Window navigation
bind -r n next-window
bind -r p previous-window
bind Tab last-window
bind BTab switch-client -l

# Session management
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Clear screen + history (requires prefix, so it doesn't shadow C-l in vim)
bind C-l send-keys C-l \; clear-history

# Sync input across all panes in window
bind S setw synchronize-panes

# ── Copy mode ────────────────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Paste
bind P choose-buffer

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# ── Rosé Pine ────────────────────────────────────────────────────────────────
# base=#191724  surface=#1f1d2e  overlay=#26233a
# muted=#6e6a86  subtle=#908caa  text=#e0def4
# love=#eb6f92  gold=#f6c177  rose=#ebbcba
# pine=#31748f  foam=#9ccfd8  iris=#c4a7e7
# highlight_med=#403d52

set -g status-style "bg=#1f1d2e,fg=#e0def4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#eb6f92,fg=#191724,bold] #S #[bg=#1f1d2e,fg=#eb6f92]"

# Right: cpu + mem + date + time
set -g status-right-length 100
set -g status-right "#[fg=#6e6a86] CPU #[fg=#e0def4]#(sh ~/.tmux/scripts/cpu.sh)#[fg=#6e6a86]  MEM #[fg=#e0def4]#(sh ~/.tmux/scripts/mem.sh)#[fg=#6e6a86]  %a %b %-d  #[fg=#f6c177,bold]%H:%M "

# Window tabs
set -g window-status-format " #[fg=#6e6a86]#I #W "
set -g window-status-current-format "#[bg=#26233a] #[fg=#ebbcba,bold]#I #W #[bg=#1f1d2e,fg=#26233a]"
set -g window-status-separator ""

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#403d52"
set -g pane-active-border-style "fg=#eb6f92"
set -g pane-border-lines single

# ── Message / command prompt ──────────────────────────────────────────────────
set -g message-style "bg=#eb6f92,fg=#191724,bold"
set -g message-command-style "bg=#26233a,fg=#e0def4"

# ── Copy mode highlight ───────────────────────────────────────────────────────
set -g mode-style "bg=#403d52,fg=#e0def4"
